<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Médico - LaMascotApp</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/css-acceso/historial-medico.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="/">LaMascotApp</a>
            </div>
            <nav class="main-nav">
                <ul class="nav-list" id="main-menu">
                    <!-- El menú se carga dinámicamente según el rol -->
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Historial Médico</h1>
                <button class="btn btn-primary" id="new-consultation-btn" style="display: none;">+ Nueva Consulta</button>
            </div>
            
            <!-- Datos del paciente -->
            <section class="patient-section" id="patient-section" style="display: none;">
                <h2>Datos del Paciente</h2>
                <div class="patient-card">
                    <div class="patient-info">
                        <p><strong>Nombre:</strong> <span id="pet-name">-</span></p>
                        <p><strong>Especie/Raza:</strong> <span id="pet-species">-</span></p>
                        <p><strong>Edad:</strong> <span id="pet-age">-</span> años</p>
                        <p><strong>Propietario:</strong> <span id="owner-name">-</span></p>
                        <p><strong>Teléfono:</strong> <span id="owner-phone">-</span></p>
                    </div>
                </div>
            </section>

            <!-- Tabs: Historial / Vacunas -->
            <div class="history-tabs">
                <button class="tab-btn active" data-tab="historial">Historial de Consultas</button>
                <button class="tab-btn" data-tab="vacunas">Vacunas</button>
            </div>

            <!-- Tab: Historial de Consultas -->
            <div id="historial-tab" class="tab-content active">
                <div class="historial-list" id="historial-list">
                    <div class="loading-state">Cargando historial...</div>
                </div>
            </div>

            <!-- Tab: Vacunas -->
            <div id="vacunas-tab" class="tab-content">
                <div class="vacunas-header">
                    <h3>Vacunas Aplicadas</h3>
                    <button class="btn btn-outline" id="new-vaccine-btn">Registrar Vacuna</button>
                </div>
                <div class="vacunas-list" id="vacunas-list">
                    <div class="loading-state">Cargando vacunas...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal para nueva consulta -->
    <div id="consulta-modal" class="modal">
        <div class="modal-content modal-lg">
            <span class="modal-close" id="close-consulta-modal">&times;</span>
            <h2>Registrar Nueva Consulta</h2>
            
            <form id="consulta-form">
                <input type="hidden" id="consulta-mascota-id" name="id_mascota">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="consulta-fecha">Fecha *</label>
                        <input type="date" id="consulta-fecha" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="consulta-peso">Peso (kg)</label>
                        <input type="number" step="0.01" id="consulta-peso" class="form-input">
                    </div>
                    
                    <div class="form-group">
                        <label for="consulta-temperatura">Temperatura (°C)</label>
                        <input type="number" step="0.1" id="consulta-temperatura" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="consulta-motivo">Motivo de la consulta *</label>
                    <textarea id="consulta-motivo" class="form-input" rows="2" required></textarea>
                </div>

                <div class="form-group">
                    <label for="consulta-sintomas">Síntomas</label>
                    <textarea id="consulta-sintomas" class="form-input" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label for="consulta-diagnostico">Diagnóstico *</label>
                    <textarea id="consulta-diagnostico" class="form-input" rows="2" required></textarea>
                </div>

                <div class="form-group">
                    <label for="consulta-tratamiento">Tratamiento *</label>
                    <textarea id="consulta-tratamiento" class="form-input" rows="2" required></textarea>
                </div>

                <div class="form-group">
                    <label for="consulta-recomendaciones">Recomendaciones</label>
                    <textarea id="consulta-recomendaciones" class="form-input" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Medicamentos Recetados</label>
                    <div id="medicamentos-container">
                        <!-- Los medicamentos se agregan dinámicamente -->
                    </div>
                    <button type="button" class="btn btn-outline btn-small" id="add-medicamento">+ Agregar medicamento</button>
                </div>

                <div class="form-group">
                    <label for="consulta-proxima-cita">Próxima cita recomendada</label>
                    <input type="date" id="consulta-proxima-cita" class="form-input">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar Consulta</button>
                    <button type="button" class="btn btn-outline" id="cancel-consulta">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal para ver detalle de consulta -->
    <div id="detalle-consulta-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="close-detalle-modal">&times;</span>
            <h2>Detalle de Consulta</h2>
            <div id="detalle-contenido"></div>
        </div>
    </div>

    <!-- Modal para nueva vacuna -->
    <div id="vacuna-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="close-vacuna-modal">&times;</span>
            <h2>Registrar Vacuna</h2>
            
            <form id="vacuna-form">
                <input type="hidden" id="vacuna-mascota-id" name="id_mascota">
                
                <div class="form-group">
                    <label for="vacuna-nombre">Nombre de la vacuna *</label>
                    <input type="text" id="vacuna-nombre" class="form-input" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="vacuna-fecha">Fecha de aplicación *</label>
                        <input type="date" id="vacuna-fecha" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="vacuna-proxima">Próxima dosis</label>
                        <input type="date" id="vacuna-proxima" class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="vacuna-lote">Lote</label>
                    <input type="text" id="vacuna-lote" class="form-input">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Registrar Vacuna</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/js-acceso/historial-medico.js"></script>
</body>
</html>
