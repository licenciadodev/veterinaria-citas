<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Citas - LaMascotApp</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/css-acceso/citas-medicas.css">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="/">LaMascotApp</a>
            </div>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="/" class="nav-link">Inicio</a></li>
                    <li><a href="/dashboard-propietario" class="nav-link">Mi Panel</a></li>
                    <li><a href="/login" class="nav-link" id="logout-link">Cerrar Sesión</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <h1 class="page-title">Gestión de Citas Médicas</h1>
            
            <!-- Selector de vista según rol -->
            <div class="role-tabs" id="role-tabs">
                <button class="tab-btn active" data-role="propietario">Mis Mascotas</button>
                <button class="tab-btn" data-role="recepcionista">Todas las Citas</button>
                <button class="tab-btn" data-role="veterinario">Mi Agenda</button>
            </div>

            <!-- Formulario para nueva cita -->
            <section class="new-appointment-section" id="new-appointment-section">
                <h2>Agendar Nueva Cita</h2>
                <form id="appointment-form" class="appointment-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="mascota">Mascota *</label>
                            <select id="mascota" name="id_mascota" class="form-select" required>
                                <option value="">Seleccione una mascota</option>
                            </select>
                            <div class="form-error" id="mascota-error"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="veterinario">Veterinario *</label>
                            <select id="veterinario" name="id_veterinario" class="form-select" required>
                                <option value="">Seleccione un veterinario</option>
                            </select>
                            <div class="form-error" id="veterinario-error"></div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="fecha">Fecha *</label>
                            <input type="date" id="fecha" name="fecha" class="form-input" required min="">
                            <div class="form-error" id="fecha-error"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="hora">Hora *</label>
                            <select id="hora" name="hora" class="form-select" required>
                                <option value="">Seleccione hora</option>
                            </select>
                            <div class="form-error" id="hora-error"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="motivo">Motivo de la consulta *</label>
                        <textarea id="motivo" name="motivo" class="form-input" rows="3" required></textarea>
                        <div class="form-error" id="motivo-error"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Agendar Cita</button>
                        <button type="button" class="btn btn-outline" id="cancel-form">Cancelar</button>
                    </div>
                </form>
            </section>

            <!-- Lista de citas -->
            <section class="appointments-list-section">
                <h2>Mis Citas</h2>
                <div class="appointments-filters">
                    <select id="filter-estado" class="form-select">
                        <option value="">Todos los estados</option>
                        <option value="programada">Programadas</option>
                        <option value="confirmada">Confirmadas</option>
                        <option value="completada">Completadas</option>
                        <option value="cancelada">Canceladas</option>
                    </select>
                    <input type="date" id="filter-fecha" class="form-input">
                </div>
                
                <div id="appointments-container" class="appointments-container">
                    <div class="loading-state">Cargando citas...</div>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal para ver/editar cita -->
    <div id="cita-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="close-modal">&times;</span>
            <h2 id="modal-title">Detalles de la Cita</h2>
            
            <div id="cita-detalles" class="cita-detalles"></div>
            
            <div class="modal-actions" id="modal-actions">
                <button class="btn btn-primary" id="edit-cita">Editar</button>
                <button class="btn btn-danger" id="cancel-cita">Cancelar Cita</button>
            </div>
        </div>
    </div>

    <script src="/js/js-acceso/citas-medicas.js"></script>
</body>
</html>
